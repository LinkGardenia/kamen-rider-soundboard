name: kamen_rider_soundboard
description: 假面骑士变身音效板
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  provider: ^6.1.1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/riders/
    - assets/images/series/
    - assets/images/symbols/
    - assets/images/backgrounds/
    - assets/images/themes/
